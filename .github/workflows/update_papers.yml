name: Update papers

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 06:00 UTC
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build config.yaml from secrets
        env:
          S2_API_KEY:      ${{ secrets.S2_API_KEY }}
          CROSSREF_EMAIL:  ${{ secrets.CROSSREF_EMAIL }}
          OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'EOF'
          import yaml, os
          cfg = yaml.safe_load(open('config.example.yaml'))
          cfg['sources']['semantic_scholar']['api_key'] = os.environ.get('S2_API_KEY', '')
          cfg['sources']['chemrxiv']['mailto'] = os.environ.get('CROSSREF_EMAIL', 'user@example.com')
          cfg.setdefault('llm', {})['openai_api_key'] = os.environ.get('OPENAI_API_KEY', '')
          yaml.dump(cfg, open('config.yaml', 'w'), default_flow_style=False)
          EOF

      - name: Fetch and render papers
        env:
          S2_API_KEY:     ${{ secrets.S2_API_KEY }}
          CROSSREF_EMAIL: ${{ secrets.CROSSREF_EMAIL }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python fetch_papers.py \
            --days 90 \
            --top-n 20 \
            --enrich-code \
            --enrich-llm \
            --update-readme

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/papers.json
          git add data/openreview_state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update papers [skip ci]"
          git push
